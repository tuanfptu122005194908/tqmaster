<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGradient)"/>
  
  <!-- TQ text -->
  <text x="32" y="24" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">TQ</text>
  
  <!-- Master text smaller -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Master</text>
  
  <!-- Decorative elements -->
  <circle cx="32" cy="32" r="30" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
