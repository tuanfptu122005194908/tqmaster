<!doctype html>
<html lang="en">
  <head>
    <script>
      // Redirect email-verification callbacks to the production domain so the
      // session token in the URL hash is consumed on the correct site.
      (function () {
        const targetHost = 'tqmaster.vercel.app';
        if (window.location.host === targetHost) return;
        const hash = window.location.hash;
        if (hash && (hash.includes('access_token') || hash.includes('type=signup'))) {
          window.location.replace(
            'https://' + targetHost + window.location.pathname + window.location.search + hash
          );
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>TQMaster</title>
    <meta name="description" content="TQMaster - Master Your Learning" />
    <meta name="author" content="TQMaster Team" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="TQMaster" />
    <meta property="og:description" content="TQMaster - Master Your Learning" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
